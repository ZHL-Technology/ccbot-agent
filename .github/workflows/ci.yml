name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile agent
        run: python -m compileall ccbot_agent

      - name: Check version command
        run: python -m ccbot_agent.main --version

      - name: Compile version helper
        run: python -m py_compile scripts/bump_version.py

  windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install pyinstaller pillow

      - name: Generate Windows icon
        shell: pwsh
        run: |
          @'
          from pathlib import Path
          from PIL import Image

          source = Path("assets/ccbot.png")
          target = Path("assets/ccbot.ico")
          image = Image.open(source).convert("RGBA")
          image.save(
              target,
              format="ICO",
              sizes=[(16, 16), (24, 24), (32, 32), (48, 48), (64, 64), (128, 128), (256, 256)],
          )
          '@ | python -

      - name: Build Windows installer
        run: pyinstaller --onefile --windowed --name CCBot-Windows-Installer --icon assets/ccbot.ico --add-data "assets/ccbot.png;assets" --add-data "assets/ccbot.ico;assets" ccbot_agent/windows_installer.py

      - name: Sign Windows installer
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          WINDOWS_CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CODESIGN_PFX_BASE64) {
            Write-Host "No Windows code-signing certificate configured. Skipping signing."
            exit 0
          }
          $certPath = "$env:RUNNER_TEMP\ccbot-codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CODESIGN_PFX_BASE64))
          & signtool sign /f $certPath /p $env:WINDOWS_CODESIGN_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 dist/CCBot-Windows-Installer.exe

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCBot-Windows-Installer
          path: dist/CCBot-Windows-Installer.exe

      - name: Attach Windows installer to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CCBot-Windows-Installer.exe
