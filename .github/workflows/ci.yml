name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile agent
        run: python -m compileall ccbot_agent

      - name: Check version command
        run: python -m ccbot_agent.main --version

      - name: Compile version helper
        run: python -m py_compile scripts/bump_version.py

  windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build Windows installer
        run: pyinstaller --onefile --windowed --name CCBot-Windows-Installer ccbot_agent/windows_installer.py

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCBot-Windows-Installer
          path: dist/CCBot-Windows-Installer.exe

      - name: Attach Windows installer to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CCBot-Windows-Installer.exe
